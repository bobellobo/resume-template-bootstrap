<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Project Placeholder</title>
  <desc id="desc">Generic project image placeholder</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="70" y="70" width="1060" height="490" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
  <text x="600" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="54" fill="#334155">Project Image Placeholder</text>
  <text x="600" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#64748b">Replace with your own image file</text>
